<!DOCTYPE html>
<html>
<head>
  <title>SRCP Map - Final Fix</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    body { margin:0; }
    #map { height:100vh; }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
var map = L.map('map').setView([23.6850, 90.3563], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var allFeatures = [];
var geoLayer;

// ================= GOOGLE DRIVE LINKS =================
var files = [
  "https://drive.google.com/uc?export=download&id=1tzFfTaqg-S1PW2S7-EtXxSEkTROCSYcQ",
  "https://drive.google.com/uc?export=download&id=1ubWxpYBf6tlaDLmJ0s-BA2LRWqcEEtxZ",
  "https://drive.google.com/uc?export=download&id=1ViJPUYknZrMSIV6HHwYZm-4J7eLP1HMp",
  "https://drive.google.com/uc?export=download&id=1wr6N0eWovHIv5VXDCu4KESvYKA54rF3z",
  "https://drive.google.com/uc?export=download&id=1qLNZY95E7x6X1jsQn1OnybtLK93NBWvO"
];

// ================= NEW STABLE LOADER =================
async function loadFile(url){
  try {
    const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(url);
    const res = await fetch(proxy);
    const data = await res.json();

    // Extract actual content
    const text = data.contents;

    return JSON.parse(text);

  } catch (err) {
    console.error("Failed:", url, err);
    return null;
  }
}

// ================= LOAD ALL =================
async function loadAll(){

  let results = await Promise.all(files.map(loadFile));

  results.forEach(r => {
    if (r && r.features) {
      allFeatures.push(...r.features);
    }
  });

  if(allFeatures.length === 0){
    alert("❌ Google Drive blocked data (file too large or proxy failed)");
    return;
  }

  drawLayer(allFeatures);
}

loadAll();

// ================= DRAW =================
function drawLayer(features){

  if(geoLayer) map.removeLayer(geoLayer);

  geoLayer = L.geoJSON(features,{
    style:{color:'yellow',weight:2}
  }).addTo(map);

  map.fitBounds(geoLayer.getBounds());
}

</script>

</body>
</html>
