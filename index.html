<!DOCTYPE html>
<html>
<head>
  <title>SRCP Map - Google Drive Final</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; }
    #map { height:100vh; }

    .search-box {
      position:absolute; top:10px; left:50%;
      transform:translateX(-50%);
      z-index:1000;
      background:white; padding:6px;
      border-radius:6px;
      box-shadow:0 0 6px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="search-box">
  <input type="text" id="groupSearch" placeholder="Pump Owner">
  <button onclick="searchPumpOwner()">Search</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ================= MAP =================
var map = L.map('map').setView([23.6850, 90.3563], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= DATA =================
var allFeatures = [];
var geoLayer;

// ================= GOOGLE DRIVE FILES (PROXY FIX) =================
var files = [
  "https://api.allorigins.win/raw?url=https://drive.google.com/uc?export=download&id=1tzFfTaqg-S1PW2S7-EtXxSEkTROCSYcQ",
  "https://api.allorigins.win/raw?url=https://drive.google.com/uc?export=download&id=1ubWxpYBf6tlaDLmJ0s-BA2LRWqcEEtxZ",
  "https://api.allorigins.win/raw?url=https://drive.google.com/uc?export=download&id=1ViJPUYknZrMSIV6HHwYZm-4J7eLP1HMp",
  "https://api.allorigins.win/raw?url=https://drive.google.com/uc?export=download&id=1wr6N0eWovHIv5VXDCu4KESvYKA54rF3z",
  "https://api.allorigins.win/raw?url=https://drive.google.com/uc?export=download&id=1qLNZY95E7x6X1jsQn1OnybtLK93NBWvO"
];

// ================= LOADER =================
async function loadData() {
  try {
    let responses = await Promise.all(files.map(url => fetch(url)));
    let jsons = await Promise.all(responses.map(res => res.json()));

    jsons.forEach(data => {
      if (data.features) {
        allFeatures.push(...data.features);
      }
    });

    drawLayer(allFeatures);

  } catch (err) {
    console.error(err);
    alert("Data loading failed (Google Drive blocked or slow)");
  }
}

loadData();

// ================= DRAW =================
function drawLayer(features){

  if(geoLayer) map.removeLayer(geoLayer);

  geoLayer = L.geoJSON(features,{
    style:{color:'yellow',weight:2,fillOpacity:0},

    onEachFeature:(feature,layer)=>{
      layer.on('click', e=>{
        let html="<table border='1'>";
        for(let k in feature.properties){
          html+=`<tr><td><b>${k}</b></td><td>${feature.properties[k]}</td></tr>`;
        }
        html+="</table>";

        L.popup()
          .setLatLng(e.latlng)
          .setContent(html)
          .openOn(map);
      });
    }

  }).addTo(map);

  if(features.length) map.fitBounds(geoLayer.getBounds());
}

// ================= SEARCH =================
function searchPumpOwner(){
  let val=document.getElementById("groupSearch").value.toLowerCase();

  let f=allFeatures.find(x =>
    x.properties.Pump_Owner &&
    x.properties.Pump_Owner.toLowerCase()===val
  );

  if(!f) return alert("Not found");

  drawLayer([f]);
}

</script>

</body>
</html>
