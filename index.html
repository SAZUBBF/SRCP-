<!DOCTYPE html>
<html>
<head>
  <title>SRCP Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; }
    #map { height:100vh; }

    .search-box {
      position:absolute; top:10px; left:50%;
      transform:translateX(-50%);
      z-index:1000;
      background:white; padding:6px;
      border-radius:6px;
      box-shadow:0 0 6px rgba(0,0,0,0.3);
      display:flex; gap:5px;
    }

    .sidebar {
      position:absolute;
      top:0; left:0;
      width:260px;
      height:100%;
      background:white;
      z-index:1000;
      padding:15px;
      box-shadow:2px 0 6px rgba(0,0,0,0.3);
      overflow-y:auto;
    }

    .sidebar h4 {
      margin:10px 0 5px;
      font-size:14px;
      border-bottom:1px solid #ddd;
    }

    .sidebar select, .sidebar button {
      width:100%;
      margin-bottom:10px;
      padding:6px;
    }

    .toggle-btn {
      position:absolute;
      top:15px;
      left:270px;
      z-index:1100;
      background:white;
      padding:6px 10px;
      cursor:pointer;
      border-radius:4px;
    }

    .left-controls {
      position:absolute;
      bottom:15px;
      left:10px;
      z-index:1000;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .locate-btn, .compass {
      background:white;
      width:40px;
      height:40px;
      border-radius:6px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .compass {
      border-radius:50%;
      color:red;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="search-box">
  <input type="text" id="groupSearch" placeholder="Pump Owner">
  <button onclick="searchPumpOwner()">Search</button>
</div>

<div id="sidebar" class="sidebar">

  <h3>Filter Panel</h3>

  <h4>Layer Selection</h4>
  <label><input type="radio" name="layerSelect" value="group" checked> Group Map</label>
  <label><input type="radio" name="layerSelect" value="pipe"> Pani Pipe</label>
  <label><input type="radio" name="layerSelect" value="both"> Group Map & Pani Pipe</label>

  <h4>Location Filter</h4>
  <select id="districtFilter"></select>
  <select id="upazilaFilter"></select>
  <select id="unionFilter"></select>
  <select id="villageFilter"></select>

  <button onclick="applyFilter()">Apply Filter</button>
  <button onclick="resetFilter()">Reset</button>

</div>

<div id="toggleBtn" class="toggle-btn">☰</div>

<div class="left-controls">
  <div class="locate-btn" id="locateBtn">📍</div>
  <div class="compass">N</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAP =================
var map = L.map('map',{ center:[23.6850,90.3563], zoom:7 });

var osm = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

var satellite = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

L.control.layers({ "Map": osm, "Satellite": satellite }).addTo(map);

// ================= LOCATION =================
document.getElementById("locateBtn").onclick = function () {
  map.locate({ setView: true, maxZoom: 16 });
};

// ================= DATA =================
var groupFiles = [
  "./data_part1.geojson",
  "./data_part2.geojson",
  "./data_part3.geojson",
  "./data_part4.geojson",
  "./data_part5.geojson"
];

var pipeFile = "./data_part6.geojson";

var groupFeatures = [];
var pipeFeatures = [];

var groupLayer, pipeLayer;

// ================= LOAD =================
async function loadData(){
  let groupRes = await Promise.all(
    groupFiles.map(f=>fetch(f).then(r=>r.json()))
  );
  groupRes.forEach(d=>groupFeatures.push(...d.features));

  let pipeRes = await fetch(pipeFile);
  pipeRes = await pipeRes.json();
  pipeFeatures = pipeRes.features;

  initFilters();
  drawLayers(groupFeatures, pipeFeatures);
}
loadData();

// ================= DRAW =================
function drawLayers(gFeatures, pFeatures){

  if(groupLayer) map.removeLayer(groupLayer);
  if(pipeLayer) map.removeLayer(pipeLayer);

  let selected = document.querySelector('input[name="layerSelect"]:checked').value;

  if(selected==="group" || selected==="both"){
    groupLayer = L.geoJSON(gFeatures,{
      style:{color:'#FFFF00',weight:2,fillOpacity:0},
      onEachFeature:popupHandler
    }).addTo(map);
  }

  if(selected==="pipe" || selected==="both"){
    pipeLayer = L.geoJSON(pFeatures,{
      pointToLayer:(f,latlng)=>L.circleMarker(latlng,{
        radius:1,
        color:"#00FFFF",
        fillOpacity:0.3,
        weight:1
      }),
      onEachFeature:popupHandler
    }).addTo(map);
  }

  let all = [...gFeatures,...pFeatures];
  if(all.length){
    let temp = L.geoJSON(all);
    map.fitBounds(temp.getBounds());
  }
}

// ================= FILTER =================
function unique(field,data){
  return [...new Set(data.map(f=>f.properties[field]).filter(Boolean))];
}

function fill(id,values){
  let el=document.getElementById(id);
  el.innerHTML=`<option value="">${id.replace("Filter","")}</option>`;
  values.forEach(v=>{
    let o=document.createElement("option");
    o.value=v; o.text=v;
    el.appendChild(o);
  });
}

function initFilters(){
  fill("districtFilter",unique("District_",groupFeatures));
}

districtFilter.onchange=function(){
  let d=this.value;
  let f=groupFeatures.filter(x=>!d||x.properties.District_===d);
  fill("upazilaFilter",unique("Upazila_",f));
};

upazilaFilter.onchange=function(){
  let d=districtFilter.value,u=this.value;
  let f=groupFeatures.filter(x=>
    (!d||x.properties.District_===d)&&
    (!u||x.properties.Upazila_===u)
  );
  fill("unionFilter",unique("Union_",f));
};

unionFilter.onchange=function(){
  let d=districtFilter.value,u=upazilaFilter.value,un=this.value;
  let f=groupFeatures.filter(x=>
    (!d||x.properties.District_===d)&&
    (!u||x.properties.Upazila_===u)&&
    (!un||x.properties.Union_===un)
  );
  fill("villageFilter",unique("Village",f));
};

function applyFilter(){
  let d=districtFilter.value,u=upazilaFilter.value,
      un=unionFilter.value,v=villageFilter.value;

  let gf = groupFeatures.filter(x=>
    (!d||x.properties.District_===d)&&
    (!u||x.properties.Upazila_===u)&&
    (!un||x.properties.Union_===un)&&
    (!v||x.properties.Village===v)
  );

  let pf = pipeFeatures.filter(x=>
    (!d||x.properties.District_===d)&&
    (!u||x.properties.Upazila_===u)&&
    (!un||x.properties.Union_===un)&&
    (!v||x.properties.Village===v)
  );

  drawLayers(gf, pf);
}

function resetFilter(){
  initFilters();
  drawLayers(groupFeatures, pipeFeatures);
}

// ================= POPUP =================
function popupHandler(feature, layer){
  layer.on('click', e=>{
    let html="<table border='1'>";
    for(let k in feature.properties){
      html+=`<tr><td><b>${k}</b></td><td>${feature.properties[k]}</td></tr>`;
    }
    html+="</table>";

    L.popup().setLatLng(e.latlng).setContent(html).openOn(map);
  });
}

// ================= SEARCH =================
function searchPumpOwner(){
  let val=document.getElementById("groupSearch").value.toLowerCase();

  let f = groupFeatures.find(x =>
    x.properties.Pump_Owner &&
    x.properties.Pump_Owner.toLowerCase()===val
  );

  if(!f) return alert("Not found");

  drawLayers([f],[]);
}

</script>

</body>
</html>
